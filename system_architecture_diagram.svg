<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 38px "Microsoft JhengHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px "Microsoft JhengHei", Arial, sans-serif; fill: #64748b; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box-blue { fill: #eff6ff; stroke: #60a5fa; }
      .box-green { fill: #ecfdf5; stroke: #34d399; }
      .box-amber { fill: #fffbeb; stroke: #f59e0b; }
      .box-purple { fill: #f5f3ff; stroke: #a78bfa; }
      .box-red { fill: #fef2f2; stroke: #fb7185; }
      .label { font: 700 24px "Microsoft JhengHei", Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 17px "Microsoft JhengHei", Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 15px "Microsoft JhengHei", Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .group-title { font: 700 22px "Microsoft JhengHei", Arial, sans-serif; fill: #1e293b; }
      .stage { font: 700 18px "Microsoft JhengHei", Arial, sans-serif; fill: #2563eb; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="820"/>
  <text x="700" y="58" text-anchor="middle" class="title">系統架構圖</text>
  <text x="700" y="91" text-anchor="middle" class="subtitle">RTSP 串流、AI 辨識、統計紀錄與前端監控資料流</text>

  <rect x="58" y="210" width="210" height="135" class="box box-blue"/>
  <text x="163" y="258" text-anchor="middle" class="label">Tapo C310</text>
  <text x="163" y="292" text-anchor="middle" class="small">攝影機</text>
  <text x="163" y="321" text-anchor="middle" class="tiny">拍攝校園 / 街口畫面</text>

  <rect x="330" y="210" width="190" height="135" class="box box-green"/>
  <text x="425" y="262" text-anchor="middle" class="label">RTSP 串流</text>
  <text x="425" y="298" text-anchor="middle" class="small">stream2 副串流</text>
  <text x="425" y="326" text-anchor="middle" class="tiny">低延遲影像來源</text>

  <rect x="590" y="130" width="420" height="450" class="box box-purple"/>
  <text x="800" y="176" text-anchor="middle" class="group-title">Python 後端辨識服務</text>

  <rect x="640" y="215" width="320" height="56" class="box"/>
  <text x="800" y="251" text-anchor="middle" class="small">OpenCV 讀取影像</text>

  <rect x="640" y="300" width="320" height="56" class="box"/>
  <text x="800" y="336" text-anchor="middle" class="small">YOLO 物件辨識</text>

  <rect x="640" y="385" width="320" height="56" class="box"/>
  <text x="800" y="421" text-anchor="middle" class="small">ByteTrack 目標追蹤</text>

  <rect x="640" y="470" width="320" height="56" class="box"/>
  <text x="800" y="506" text-anchor="middle" class="small">人流 / 車流統計</text>

  <rect x="1078" y="165" width="240" height="110" class="box box-amber"/>
  <text x="1198" y="210" text-anchor="middle" class="label">CSV 紀錄</text>
  <text x="1198" y="244" text-anchor="middle" class="small">時段統計報表</text>

  <rect x="1078" y="345" width="240" height="110" class="box box-green"/>
  <text x="1198" y="390" text-anchor="middle" class="label">WebSocket</text>
  <text x="1198" y="424" text-anchor="middle" class="small">即時傳送結果</text>

  <rect x="1078" y="535" width="240" height="135" class="box box-red"/>
  <text x="1198" y="583" text-anchor="middle" class="label">前端監控儀表板</text>
  <text x="1198" y="618" text-anchor="middle" class="small">即時影像 / 統計圖表</text>
  <text x="1198" y="646" text-anchor="middle" class="tiny">模式切換與 CSV 匯出</text>

  <path d="M268 278 H330" class="arrow"/>
  <path d="M520 278 H590" class="arrow"/>

  <path d="M800 271 V300" class="arrow"/>
  <path d="M800 356 V385" class="arrow"/>
  <path d="M800 441 V470" class="arrow"/>

  <path d="M960 498 C1030 498, 1030 220, 1078 220" class="arrow"/>
  <path d="M960 498 C1030 498, 1030 400, 1078 400" class="arrow"/>
  <path d="M1198 455 V535" class="arrow"/>

  <text x="299" y="258" text-anchor="middle" class="stage">影像來源</text>
  <text x="555" y="258" text-anchor="middle" class="stage">串流輸入</text>
  <text x="1027" y="207" text-anchor="middle" class="stage">紀錄</text>
  <text x="1026" y="386" text-anchor="middle" class="stage">即時資料</text>

  <rect x="92" y="610" width="820" height="105" class="box"/>
  <text x="125" y="650" class="label">目前系統模式</text>
  <text x="125" y="687" class="small">校園人流：YOLO 只辨識 person，統計往宿舍 / 星巴門 / 體育門</text>
  <text x="125" y="717" class="small">街口車流：YOLO 只辨識 car / motorcycle / bus / truck，統計汽車與機車時段流量</text>
</svg>
